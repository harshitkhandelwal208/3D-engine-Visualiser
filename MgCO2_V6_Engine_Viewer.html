<!DOCTYPE html>
<html lang="en">
<head>

<title>MgCO₂ V6 Compression Engine — Interactive 3D</title>
<style>

  body{background:#0e1117;font-family:'Segoe UI',sans-serif;overflow:hidden;color:#e0e0e0}
  #canvas{display:block;width:100vw;height:100vh}

  /* ── Tooltip popup ─────────────── */
  #popup{
    position:fixed;left:0;top:0;
    background:rgba(14,20,32,0.96);
    border:1px solid rgba(80,160,255,0.35);
    border-radius:10px;padding:14px 18px;
    max-width:280px;pointer-events:none;
    opacity:0;transition:opacity .18s;
    backdrop-filter:blur(6px);
    box-shadow:0 4px 24px rgba(0,0,0,0.6);
    z-index:100;
  }
  #popup.vis{opacity:1}
  #popup h3{font-size:13px;font-weight:600;color:#7ec8ff;margin-bottom:6px;line-height:1.3}
  #popup .mat{font-size:10px;color:#6a8aaa;margin-bottom:8px;letter-spacing:.04em;text-transform:uppercase}
  #popup p{font-size:12px;color:#b0c4d8;line-height:1.55}
  #popup .chem{font-size:11px;color:#5de8b0;margin-top:6px;font-family:monospace}

  /* ── Legend ───────────────────── */
  #legend{
    position:fixed;right:16px;top:16px;
    background:rgba(14,20,32,0.88);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:8px;padding:12px 16px;
    font-size:11px;line-height:1.9;
    backdrop-filter:blur(4px);
    z-index:90;
  }
  #legend h4{color:#7ec8ff;font-size:11px;font-weight:600;margin-bottom:6px;letter-spacing:.05em}
  .leg-row{display:flex;align-items:center;gap:8px;cursor:pointer;border-radius:4px;padding:2px 4px;transition:background .1s}
  .leg-row:hover{background:rgba(255,255,255,0.06)}
  .leg-swatch{width:12px;height:12px;border-radius:3px;flex-shrink:0}
  .leg-row.active{
  background:rgba(80,160,255,0.15);
}
  /* ── Controls hint ────────────── */
  #hint{
    position:fixed;left:16px;bottom:16px;
    background:rgba(14,20,32,0.75);
    border:1px solid rgba(255,255,255,0.07);
    border-radius:6px;padding:8px 12px;
    font-size:10px;color:#5a7a9a;line-height:1.8;
    backdrop-filter:blur(4px);
  }

  /* ── Title ────────────────────── */
  #title{
    position:fixed;left:16px;top:16px;
    font-size:14px;font-weight:600;color:#c0d8f0;
    text-shadow:0 0 20px rgba(80,160,255,0.4);
    pointer-events:none;
    z-index:90;
  }
  #title span{font-size:10px;color:#4a6a8a;display:block;font-weight:400;margin-top:2px}

  /* ── Explosion toggle ─────────── */
  #controls{
    position:fixed;left:16px;bottom:80px;
    display:flex;flex-direction:column;gap:8px;
    z-index:90;
  }
  .ctrl-btn{
    background:rgba(30,50,80,0.85);border:1px solid rgba(80,140,220,0.3);
    color:#90c0e8;font-size:11px;border-radius:6px;padding:7px 14px;
    cursor:pointer;transition:all .15s;backdrop-filter:blur(4px);
    text-align:center;
  }
  .ctrl-btn:hover{background:rgba(40,80,130,0.9);border-color:rgba(120,180,255,0.5);color:#c0e0ff}
  .ctrl-btn.active{background:rgba(20,60,110,0.95);border-color:#5098dd;color:#70c0ff}
body::after{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  background:radial-gradient(circle at center, transparent 60%, rgba(0,0,0,0.4));
}
</style>
</head>

function getInfo(name) {
  // Try exact match first
  if (PART_INFO[name]) return PART_INFO[name];
  // Try prefix/keyword match
  for (const [key, val] of Object.entries(PART_INFO)) {
    if (name.startsWith(key)) return val;
    if (name.includes(key.replace(/_/g,' '))) return val;
  }
  // Fallback: extract readable name
  const readable = name.replace(/_[LR]\d+$/, '').replace(/_\d+$/, '').replace(/_/g,' ');
  return {title: readable, mat:'', desc:'Part of the MgCO₂ V6 engine assembly.', chem:''};
}

const matCache = {};
function getMat(matName) {
  if (matCache[matName]) return matCache[matName];
  const cfg = matColors[matName] || {color:0x888888, metal:0.5, rough:0.5};
  const transparent = cfg.opacity !== undefined;
  const m = new THREE.MeshStandardMaterial({
    color: cfg.color,
    metalness: cfg.metal ?? 0.5,
    roughness: cfg.rough ?? 0.5,
    transparent: transparent,
    opacity: transparent ? cfg.opacity : 1.0,
    side: transparent ? THREE.DoubleSide : THREE.FrontSide,
    depthWrite: !transparent,
  });
  matCache[matName] = m;
  return m;
}

// ─────────────────────────────────────────────────────────────────
// GLB parser
// ─────────────────────────────────────────────────────────────────
const engineGroup = new THREE.Group();
scene.add(engineGroup);

const meshObjects = []; // {mesh3d, name, matName, origPos}

async function loadGLBBuffer(buf) {
  const view = new DataView(buf);

  // Header
  const magic   = view.getUint32(0, true);
  const version = view.getUint32(4, true);
  const total   = view.getUint32(8, true);

  let offset = 12;
  let jsonData = null, binData = null;
  while (offset < total) {
    const chunkLen  = view.getUint32(offset,   true);
    const chunkType = view.getUint32(offset+4, true);
    const chunkData = buf.slice(offset+8, offset+8+chunkLen);
    if (chunkType === 0x4E4F534A) {
      jsonData = JSON.parse(new TextDecoder().decode(chunkData));
    } else if (chunkType === 0x004E4942) {
      binData = chunkData;
    }
    offset += 8 + chunkLen;
  }

  const bufferViews = jsonData.bufferViews;
  const accessors   = jsonData.accessors;
  const materials   = jsonData.materials;

  function getAccessorData(accIdx) {
    const acc = accessors[accIdx];
    const bv  = bufferViews[acc.bufferView];
    const byteOff = (bv.byteOffset || 0) + (acc.byteOffset || 0);
    const compMap = {5120:Int8Array,5121:Uint8Array,5122:Int16Array,5123:Uint16Array,
                     5125:Uint32Array,5126:Float32Array};
    const TypedArr = compMap[acc.componentType];
    const elemsPerItem = {SCALAR:1,VEC2:2,VEC3:3,VEC4:4,MAT4:16}[acc.type];
    return new TypedArr(binData, byteOff, acc.count * elemsPerItem);
  }

  for (let mi = 0; mi < jsonData.meshes.length; mi++) {
    const gltfMesh = jsonData.meshes[mi];
    const node     = jsonData.nodes[mi];
    const prim     = gltfMesh.primitives[0];
    const matIdx   = prim.material ?? 0;
    const matName  = materials[matIdx].name;

    const positions = getAccessorData(prim.attributes.POSITION);
    const indices   = getAccessorData(prim.indices);

    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
    geom.setIndex(new THREE.BufferAttribute(new Uint32Array(indices), 1));
    geom.computeVertexNormals();

    const mat  = getMat(matName);
    const mesh = new THREE.Mesh(geom, mat);
    mesh.name  = gltfMesh.name;
    mesh.userData.matName = matName;
    mesh.userData.origPos = mesh.position.clone();
    mesh.castShadow = true;
    mesh.receiveShadow = true;


    // Apply node transforms (FIXES STACKING ISSUE)
    if (node.translation) {
      mesh.position.fromArray(node.translation);
    }
    if (node.rotation) {
      mesh.quaternion.fromArray(node.rotation);
    }
    if (node.scale) {
      mesh.scale.fromArray(node.scale);
} 

    engineGroup.add(mesh);
    meshObjects.push({mesh3d:mesh, name:gltfMesh.name, matName, origPos:mesh.position.clone()});
  }

const box = new THREE.Box3().setFromObject(engineGroup);
const size = box.getSize(new THREE.Vector3());
const ctr = box.getCenter(new THREE.Vector3());

// Center properly
  engineGroup.position.sub(ctr);

// Normalize scale (prevents clipping + improves composition)
  const maxDim = Math.max(size.x, size.y, size.z);
  const scale = 1.5 / maxDim;
  engineGroup.scale.setScalar(scale);

// Slight tilt for presentation feel
  engineGroup.rotation.x = -Math.PI * 0.08;

  buildLegend();
  console.log(`Loaded ${meshObjects.length} meshes`);
}

// Legend builder
// ─────────────────────────────────────────────────────────────────
function buildLegend() {
  const leg = document.getElementById('legend');
  const seen = new Set();
  const colorMap = {};

  for (const [k,v] of Object.entries(matColors)) {
    colorMap[k] = '#'+v.color.toString(16).padStart(6,'0');
  }

  for (const {matName} of meshObjects) {
    if (seen.has(matName)) continue;
    seen.add(matName);

    const hex = colorMap[matName] || '#888';

    const row = document.createElement('div');
    row.className = 'leg-row';
    row.innerHTML = `<div class="leg-swatch" style="background:${hex}"></div><span>${matName}</span>`;

    // ✅ Proper click handler (NOW scoped correctly)
    row.addEventListener('click', () => {
      highlightByMat(matName);

      document.querySelectorAll('.leg-row').forEach(r => r.classList.remove('active'));
      row.classList.add('active');
    });

    leg.appendChild(row);
  }
}

// Orbit controls (manual implementation)
// ─────────────────────────────────────────────────────────────────
let isDragging=false, isRightDrag=false;
let prevMouse={x:0,y:0};
let spherical={theta:0.8,phi:1.1,r:2.2};
let panOffset={x:0,y:0};
let targetSpherical={...spherical};
let targetPan={x:0,y:0};

function updateCamera() {
  spherical.theta += (targetSpherical.theta - spherical.theta)*0.12;
  spherical.phi   += (targetSpherical.phi   - spherical.phi  )*0.12;
  spherical.r     += (targetSpherical.r     - spherical.r    )*0.12;
  panOffset.x += (targetPan.x - panOffset.x)*0.12;
  panOffset.y += (targetPan.y - panOffset.y)*0.12;

  const x = spherical.r * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  const y = spherical.r * Math.cos(spherical.phi);
  const z = spherical.r * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.position.set(x + panOffset.x, y + panOffset.y, z);
  camera.lookAt(panOffset.x, panOffset.y, 0);
}

canvas.addEventListener('mousedown', e => {
  isDragging=true; isRightDrag=(e.button===2);
  prevMouse={x:e.clientX,y:e.clientY};
});
canvas.addEventListener('contextmenu', e=>e.preventDefault());
window.addEventListener('mouseup', ()=>isDragging=false);
window.addEventListener('mousemove', e => {
  if (!isDragging) { doRaycast(e); return; }
  const dx=(e.clientX-prevMouse.x)/window.innerWidth;
  const dy=(e.clientY-prevMouse.y)/window.innerHeight;
  if (isRightDrag) {
    targetPan.x -= dx*2; targetPan.y += dy*2;
  } else {
    targetSpherical.theta -= dx*4;
    targetSpherical.phi   = Math.max(0.1, Math.min(Math.PI-0.1, targetSpherical.phi+dy*3));
  }
  prevMouse={x:e.clientX,y:e.clientY};
});
canvas.addEventListener('wheel', e => {
  targetSpherical.r = Math.max(0.5, Math.min(6, targetSpherical.r + e.deltaY*0.002));
  e.preventDefault();
}, {passive:false});

function resetCamera() {
  targetSpherical = {theta:0.8,phi:1.1,r:2.2};
  targetPan = {x:0,y:0};

  clearHighlight(); // ← ADD THIS
}

// ─────────────────────────────────────────────────────────────────
// Raycasting for hover + click popups
// ─────────────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse     = new THREE.Vector2();
const popup     = document.getElementById('popup');
let   hovered   = null;

function doRaycast(e) {
  mouse.x = (e.clientX/window.innerWidth)*2-1;
  mouse.y = -(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const meshList = meshObjects.map(o=>o.mesh3d);
  const hits = raycaster.intersectObjects(meshList, false);

  if (hits.length > 0) {
    const hit = hits[0];
    const obj = hit.object;
    if (hovered !== obj) {
      if (hovered) hovered.material.emissive?.set(0x000000);
      hovered = obj;
      if (!obj.material.transparent) {
        if (!obj.userData.hoverMat) {
              obj.userData.hoverMat = obj.material.clone();}
        obj.material = obj.userData.hoverMat;
        obj.material.emissive = new THREE.Color(0x223344);
        obj.material.emissiveIntensity = 0.4;
      }
    }
    // Show popup
    const info = getInfo(obj.name);
    document.getElementById('pop-name').textContent = info.title;
    document.getElementById('pop-mat').textContent  = info.mat;
    document.getElementById('pop-desc').textContent = info.desc;
    document.getElementById('pop-chem').textContent = info.chem;
    popup.classList.add('vis');

    // Position popup near cursor but avoid edges
    let px = e.clientX + 20, py = e.clientY - 10;
    if (px + 290 > window.innerWidth)  px = e.clientX - 300;
    if (py + 200 > window.innerHeight) py = e.clientY - 210;
    popup.style.left = px+'px'; popup.style.top = py+'px';
  } else {
    if (hovered) { hovered.material.emissive?.set(0x000000); hovered=null; }
    popup.classList.remove('vis');
  }
}

canvas.addEventListener('click', e => {
  mouse.x = (e.clientX/window.innerWidth)*2-1;
  mouse.y = -(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(meshObjects.map(o=>o.mesh3d), false);
  if (hits.length>0) {
    // Focus camera toward clicked object
    const pos = hits[0].object.position.clone().applyMatrix4(engineGroup.matrixWorld);
    targetPan.x = pos.x*0.3; targetPan.y = pos.y*0.3;
  }
});

// Highlight by material
// ─────────────────────────────────────────────────────────────────
let highlightedMat = null;
function highlightByMat(matName) {
  // TOGGLE LOGIC
  if (selectedMat === matName) {
    selectedMat = null;
    clearHighlight();
    return;
  }

  selectedMat = matName;

  meshObjects.forEach(({mesh3d, matName:mn}) => {
    if (mn === matName) {
      mesh3d.material.opacity = 1.0;
      mesh3d.material.transparent = false;

      mesh3d.material.emissive = new THREE.Color(0x335577);
      mesh3d.material.emissiveIntensity = 0.7;
    } else {
      mesh3d.material.transparent = true;
      mesh3d.material.opacity = 0.05; // slightly lower for better focus

      if (mesh3d.material.emissive)
        mesh3d.material.emissive.set(0x000000);
    }
  });
}
function clearHighlight() {
  selectedMat = null;

  meshObjects.forEach(({mesh3d}) => {
    mesh3d.material.opacity = 1;
    mesh3d.material.transparent = false;

    if (mesh3d.material.emissive)
      mesh3d.material.emissive.set(0x000000);
  });
}

function getExplodeOffset(matName) {
  return EXPLODE_GROUPS[matName] ? new THREE.Vector3(...EXPLODE_GROUPS[matName]) : new THREE.Vector3();
}

function toggleExplode() {
  exploded = !exploded;
  document.getElementById('btn-explode').classList.toggle('active', exploded);
}

// Cutaway: hide half the engine (x<0 meshes)
let cutaway = false;
function toggleCutaway() {
  cutaway = !cutaway;
  document.getElementById('btn-cutaway').classList.toggle('active', cutaway);
  meshObjects.forEach(({mesh3d}) => {
    const box = new THREE.Box3().setFromObject(mesh3d);
    const ctr = box.getCenter(new THREE.Vector3());
    const worldCtr = ctr.applyMatrix4(engineGroup.matrixWorld);
    if (cutaway && worldCtr.x < -0.02) {
      mesh3d.visible = false;
    } else {
      mesh3d.visible = true;
    }
  });
}

// Animate
// ─────────────────────────────────────────────────────────────────
let animTime = 0;
function animate() {
  requestAnimationFrame(animate);
  animTime += 0.016;

  // Gentle engine rotation when idle
  if (!isDragging && autoRotate) {
    engineGroup.rotation.y += 0.002;
  }

  // Glow pulse
  glowLight.intensity = 0.5 + 0.3*Math.sin(animTime*3.5);

  // Explode animation
  const targetT = exploded ? 1 : 0;
  explodeT += (targetT - explodeT) * 0.06;
meshObjects.forEach(({mesh3d, matName, origPos}) => {
  const off = getExplodeOffset(matName);

  mesh3d.position.x = origPos.x + off.x * explodeT;
  mesh3d.position.y = origPos.y + off.y * explodeT;
  mesh3d.position.z = origPos.z + off.z * explodeT;
});

  updateCamera();
  renderer.render(scene, camera);
}
